services:
  - type: web
    name: urban-hire
    env: python
    buildCommand: uv sync && uv run python manage.py collectstatic --noinput
    startCommand: uv run gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
